name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    tags: [ "*" ]

env:
  IMAGE_NAME: leo-vidros-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.VITE_MAPS_KEY }}" ]]; then
            echo "Missing required secret: VITE_MAPS_KEY"
            exit 1
          fi

      - name: Build frontend
        env:
          VITE_BACKEND_URL: /api
          VITE_MAPS_KEY: ${{ secrets.VITE_MAPS_KEY }}
        run: npm run build
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define image tags
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${IMAGE}:latest,${IMAGE}:${VERSION}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            TAGS="${IMAGE}:manual-${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_BACKEND_URL=/api
            VITE_MAPS_KEY=${{ secrets.VITE_MAPS_KEY }}