name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    tags: 
      - '*.*.*' 

env:
  IMAGE_NAME: leo-vidros-app

jobs:
  deploy_docker_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.VITE_MAPS_KEY }}" ]]; then
            echo "Missing required secret: VITE_MAPS_KEY"
            exit 1
          fi

      - name: Build frontend
        env:
          VITE_BACKEND_URL: /api
          VITE_MAPS_KEY: ${{ secrets.VITE_MAPS_KEY }}
        run: npm run build
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build --pull --no-cache \
            -f Dockerfile \
            --build-arg VITE_BACKEND_URL=/api \
            --build-arg VITE_MAPS_KEY=${{ secrets.VITE_MAPS_KEY }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-app:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-app:$VERSION \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-app:$VERSION
          